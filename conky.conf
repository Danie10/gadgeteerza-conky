conky.config = {
    alignment = 'top_left',
    background = false,
    border_width = 1,
    cpu_avg_samples = 2,
    default_color = 'white',
    default_outline_color = 'white',
    default_shade_color = 'white',
    double_buffer = true,
    draw_borders = false,
    draw_graph_borders = true,
    draw_outline = false,
    draw_shades = false,
    extra_newline = false,
    font = 'DejaVu Sans Mono:size=12',
    gap_x = 40,
    gap_y = 60,
    minimum_height = 5,
    minimum_width = 5,
    net_avg_samples = 2,
    no_buffers = true,
    out_to_console = false,
    out_to_ncurses = false,
    out_to_stderr = false,
    out_to_x = true,
    own_window = true,
    own_window_class = 'Conky',
    own_window_type = 'normal',
    show_graph_range = false,
    show_graph_scale = false,
    stippled_borders = 0,
    update_interval = 10.0,
    uppercase = false,
    use_spacer = 'none',
    use_xft = true,
    -- Path to your Lua script for audio alerts
    lua_load = '/home/danie/scripts/temp_alerts.lua',
}

conky.text = [[
${font Good Times:size=12}${color Tan1}INFO ${font}$color ${scroll 32 $sysname $kernel $machine}
$hr
${color grey}Uptime:$color $uptime
${color grey}Window Manager:$color $XDG_SESSION_TYPE
${color grey}RAM Usage:$color $mem/$memmax - $memperc% ${membar 4}
${color grey}Swap Usage:$color $swap/$swapmax - $swapperc% ${swapbar 4}
${color grey}Zram Usage: $color ${execi 60 zramctl --raw --noheadings --output TOTAL,DISKSIZE | awk '{print $1 " / " $2}'}
$hr
${font Good Times:size=12}${color Tan1}CPU ${font}$color $alignr${execi 1000 cat /proc/cpuinfo | grep 'model name' | sed -e 's/model name.*: //'| uniq}
# CPU Temp Logic with Audio Alert
${execi 10 sensors | grep 'Tctl' | cut -c16-19 > /tmp/cpu_temp}${color grey}Temperature: \
${if_match ${cat /tmp/cpu_temp} >= 80}${color red}\
${else}${color green}${endif}\
$alignr${cat /tmp/cpu_temp}°C${lua check_alert CPU /tmp/cpu_temp}
${color grey}Usage:$color $cpu% ${cpubar 4}
${color grey}Fan:  $color $alignr ${execi 27 sensors | grep 'fan1' | cut -c13-21}
$hr
${font Good Times:size=12}${color Tan1}GPU ${font}$color $alignr ${execi 3600 nvidia-smi --query-gpu=name --format=csv,noheader,nounits}
# GPU Temp Logic with Audio Alert
${color grey}Temperature:${execi 20 nvidia-smi --query-gpu=temperature.gpu --format=csv,noheader,nounits > /tmp/gpu_temp}\
${if_match ${cat /tmp/gpu_temp} >= 75}${color red}${else}${color green}${endif}\
$alignr${cat /tmp/gpu_temp} °C${lua check_alert GPU /tmp/gpu_temp}
${color grey}Throttle at:$color $alignr ${execi 30 nvidia-smi -q -d temperature | grep "GPU Slowdown Temp" | awk '{print $5}'} °C
${color grey}Graphics Usage: $color $alignr ${execi 5 nvidia-smi --query-gpu=utilization.gpu --format=csv,noheader,nounits} %
${color grey}Video Decoder: $color $alignr ${execi 5 nvidia-smi --query-gpu=utilization.decoder --format=csv,noheader,nounits} %
${color grey}Video Encoder: $color $alignr ${execi 5 nvidia-smi --query-gpu=utilization.encoder --format=csv,noheader,nounits} %
${color grey}Fan speed: $color $alignr ${execi 28 nvidia-smi --query-gpu=fan.speed --format=csv,noheader,nounits} %
$hr
${font Good Times:size=12}${color Tan1}CHASSIS FANS ${font}
${color grey}Front Fan:$color $alignr ${execi 21 sensors | grep 'fan2' | cut -c13-21}
${color grey}Rear Fan: $color $alignr ${execi 22 sensors | grep 'fan3' | cut -c13-21}
$hr
${font Good Times:size=12}${color Tan1}DRIVE TEMPS ${font}
# NVMe Alert
${execi 20 sudo nvme smart-log /dev/nvme0n1 | grep '^temperature' | awk '{print $3}' > /tmp/nvme_temp}\
${color grey}NVMe: ${if_match ${cat /tmp/nvme_temp} >= 70}${color red}${else}${color green}${endif}$alignr${cat /tmp/nvme_temp}°C ${lua check_alert NVMe /tmp/nvme_temp}
# HDD SDA Alert (Home)
${execi 300 sudo smartctl -A /dev/sda | awk '$1=="194" {print $10}' > /tmp/sda_temp}\
${color grey}Home  ${if_match ${cat /tmp/sda_temp} >= 60}${color red}${else}${color green}${endif}$alignr${cat /tmp/sda_temp}°C ${lua check_alert Drive_SDA /tmp/sda_temp}
# HDD SDC Alert (Backup)
${execi 300 sudo smartctl -A /dev/sdc | awk '$1=="194" {print $10}' > /tmp/sdc_temp}\
${color grey}Backup  ${if_match ${cat /tmp/sdc_temp} >= 60}${color red}${else}${color green}${endif}$alignr${cat /tmp/sdc_temp}°C ${lua check_alert Drive_SDC /tmp/sdc_temp}
${color grey}$hr
${font Good Times:size=12}${color Tan1}FILE SYSTEMS FREE SPACE ${font}
${color grey}Linux Boot $color${fs_free /} of ${fs_size /} ${fs_bar 6 /}
${color grey}Home       $color${fs_free /home} of ${fs_size /home} ${fs_bar 6 /home}
${color grey}Win Boot   $color${fs_free /run/media/danie/Winboot} of ${fs_size /run/media/danie/Winboot} ${fs_bar 6 /run/media/danie/Winboot} 
${color grey}Win D      $color${fs_free /run/media/danie/WinD} of ${fs_size /run/media/danie/WinD} ${fs_bar 6 /run/media/danie/WinD} 
${color grey}Backup     $color${fs_free /run/media/danie/LinuxBackup} of ${fs_size /run/media/danie/LinuxBackup} ${fs_bar 6 /run/media/danie/LinuxBackup}
$hr
${font Good Times:size=12}${color Tan1}NETWORKING ${font}
${if_existing /sys/class/net/enp5s0/operstate up}\
${color #0077ff}Net Down:$color ${downspeedf enp5s0} $alignr${color #0077ff}Net Up:$color ${upspeedf enp5s0}
${color #0077ff}${downspeedgraph enp5s0 32,155 104E8B 0077ff} $alignr${color #0077ff}${upspeedgraph enp5s0 32,155 104E8B 0077ff}\
${endif}$color
$hr
${font Good Times:size=12}${color Tan1}TOP PROCESSES ${font}
${color grey} Name                PID    CPU%   MEM%
${color lightgrey} ${top name 1} ${top pid 1} ${top cpu 1} ${top mem 1}
${color lightgrey} ${top name 2} ${top pid 2} ${top cpu 2} ${top mem 2}
${color lightgrey} ${top name 3} ${top pid 3} ${top cpu 3} ${top mem 3}
${color lightgrey} ${top name 4} ${top pid 4} ${top cpu 4} ${top mem 4}
]]
